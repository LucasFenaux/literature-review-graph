name: Release Standalone App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Executables
        run: npm run build:exe

      - name: Rename binaries for consistency
        run: |
          mv release/literature-review-graph-linux release/app-linux
          mv release/literature-review-graph-macos release/app-macos
          mv release/literature-review-graph-win.exe release/app-windows.exe

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/app-linux
            release/app-macos
            release/app-windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
