name: Release Standalone App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: node18-linux-x64
            artifact_name: literature-review-graph
            final_name: app-linux
          - os: macos-latest
            target: node18-macos-x64
            artifact_name: literature-review-graph
            final_name: app-macos
          - os: windows-2022
            target: node18-win-x64
            artifact_name: literature-review-graph.exe
            final_name: app-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20 (Required for Next.js build)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Build Next.js & Server
        run: |
          npm run build
          npm run build:server

      - name: Setup Node.js 18 (Required for pkg native bindings)
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Rebuild native extensions for Node 18
        run: npm rebuild better-sqlite3

      - name: Build Executable
        run: npx pkg . --target ${{ matrix.target }} --out-path release

      - name: Rename binaries for consistency (Linux/macOS)
        if: runner.os != 'Windows'
        run: mv release/${{ matrix.artifact_name }} release/${{ matrix.final_name }}

      - name: Rename binaries for consistency (Windows)
        if: runner.os == 'Windows'
        run: move release\${{ matrix.artifact_name }} release\${{ matrix.final_name }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/${{ matrix.final_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
